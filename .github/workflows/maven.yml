name: Build & SonarCloud Analysis

on:
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}
          cache: maven

      - name: Build, test & generate coverage
        run: mvn verify --batch-mode

      - name: Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -Dsonar.organization=fadliachsan27 -Dsonar.projectKey=fadliachsan27_103022300018_Muhammad Fadli Achsan Kurniawan_Praktik-MKEPL -Dsonar.host.url=https://sonarcloud.io -Dsonar.branch.name=main --batch-mode

      # Optional: Uploads the full dependency graph to GitHub
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e23809969lde18d6b7d6

      - name: Verify settings.xml exists in .m2 directory
        run: ls -al ~/.m2

      - name: Publish to GitHub Packages Apache Maven
        run: mvn deploy -s $GITHUB_WORKSPACE/pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
